<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.title.wardrobe"></title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/edit-mode.css">
</head>
<body>

    <header class="mobile-header">
        <h1 data-i18n="wardrobe.header"></h1>
        <button id="edit-mode-btn" class="edit-btn" onclick="toggleEditMode()" data-i18n="common.edit"></button>
    </header>

    <div class="search-container">
        <input type="text" id="wardrobe-search" data-i18n-placeholder="wardrobe.search.placeholder"
               class="form-control search-input">
        <button id="search-btn" class="btn-primary search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>

    <!-- Filter Tags -->
    <div class="filter-tags-container">
        <div class="filter-tag active" onclick="filterByType(this, 'all')" data-i18n="wardrobe.filter.all"></div>
        <div class="filter-tag" onclick="filterByType(this, 'top')" data-i18n="wardrobe.filter.top"></div>
        <div class="filter-tag" onclick="filterByType(this, 'bottom')" data-i18n="wardrobe.filter.bottom"></div>
        <div class="filter-tag" onclick="filterByType(this, 'outerwear')" data-i18n="wardrobe.filter.outerwear"></div>
        <div class="filter-tag" onclick="filterByType(this, 'full_body')" data-i18n="wardrobe.filter.full_body"></div>
        <div class="filter-tag" onclick="filterByType(this, 'shoes')" data-i18n="wardrobe.filter.shoes"></div>
        <div class="filter-tag" onclick="filterByType(this, 'accessory')" data-i18n="wardrobe.filter.accessory"></div>
    </div>

    <div class="container" id="wardrobe-list">
        <!-- Clothes list injected by JS -->
    </div>

    <!-- FAB for adding item -->
    <button class="fab" onclick="openModal('add-modal')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <!-- Add Item Modal -->
    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" data-i18n="wardrobe.add.title"></div>
                <button class="close-btn" onclick="closeModal('add-modal')">×</button>
            </div>
            <div class="form-group">
                <label data-i18n="wardrobe.add.label.name"></label>
                <input type="text" id="item-name" class="form-control" data-i18n-placeholder="wardrobe.add.placeholder.name">
            </div>
            <div class="form-group">
                <label data-i18n="wardrobe.add.label.type"></label>
                <select id="item-type" class="form-control">
                    <option value="top" data-i18n="wardrobe.filter.top"></option>
                    <option value="bottom" data-i18n="wardrobe.filter.bottom"></option>
                    <option value="outerwear" data-i18n="wardrobe.filter.outerwear"></option>
                    <option value="shoes" data-i18n="wardrobe.filter.shoes"></option>
                    <option value="accessory" data-i18n="wardrobe.filter.accessory"></option>
                </select>
            </div>
            <div class="form-group">
                <label data-i18n="wardrobe.add.label.photo"></label>
                <div id="upload-area" class="upload-area" onclick="triggerUpload()">
                    <span id="upload-placeholder" data-i18n="wardrobe.add.upload.tap"></span>
                    <img id="upload-preview" class="upload-preview">
                </div>
                <input type="file" id="file-input" class="hidden-input" accept="image/*" onchange="handleFileSelect(event)">
            </div>
            <button class="btn-block btn-primary" onclick="addItem()" data-i18n="wardrobe.add.button.save"></button>
        </div>
    </div>

    <!-- Detail View Overlay -->
    <div id="detail-view" class="detail-view">
        <div id="detail-content-body">
            <!-- Injected by JS -->
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span data-i18n="nav.home"></span>
        </a>
        <a href="wardrobe.html" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
            <span data-i18n="nav.wardrobe"></span>
        </a>
        <a href="favorites.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span data-i18n="nav.schedule"></span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span data-i18n="nav.profile"></span>
        </a>
    </nav>

    <!-- Edit Mode Footer -->
    <div id="edit-footer" class="edit-footer">
        <span class="delete-count"></span>
        <button id="delete-selected-btn" class="btn-danger" onclick="deleteSelected()" disabled data-i18n="common.delete"></button>
    </div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script>
        // JS will call renderWardrobe() automatically
    </script>
</body>
</html>
