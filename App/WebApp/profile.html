<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.title.profile"></title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auto-location.css">
</head>
<body>

    <div class="profile-header">
        <button class="edit-btn" onclick="openModal('edit-modal')" data-i18n="common.edit"></button>
        <img src="images/avatar_minimal_light.svg" class="profile-avatar" data-avatar-style="minimal" data-i18n-alt="profile.avatar.alt">
        <h2 class="profile-name" id="display-name"></h2>
        <p class="profile-role" data-i18n="profile.role.default"></p>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-title" data-i18n="profile.edit.title"></div>
            
            <div class="form-group">
                <label class="form-label" data-i18n="profile.edit.label.name"></label>
                <input type="text" class="form-input" id="edit-name">
            </div>
            
            <div class="form-group">
                <label class="form-label" data-i18n="profile.edit.label.avatar"></label>
                <div class="avatar-upload-container">
                    <img id="edit-avatar-preview" src="images/avatar_minimal_light.svg" class="profile-avatar avatar-preview-lg" data-avatar-style="minimal" onclick="document.getElementById('edit-avatar-input').click()">
                    <input type="file" id="edit-avatar-input" accept="image/*" onchange="previewAvatar(this)" hidden>
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('edit-avatar-input').click()" data-i18n="common.choose_image"></button>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('edit-modal')" data-i18n="common.cancel"></button>
                <button class="btn btn-save" onclick="saveProfile()" data-i18n="common.save"></button>
            </div>
        </div>
    </div>

    <div class="menu-list">
        <div class="menu-item" onclick="openModal('region-modal')">
            <span data-i18n="profile.menu.region"></span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="text-sub" id="current-region" style="font-size: 13px;" data-i18n="region.status.detecting"></span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
        </div>
        <div class="menu-item" onclick="openModal('profession-modal')">
            <span data-i18n="profile.menu.profession"></span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="text-sub" id="current-profession" style="font-size: 13px;" data-i18n="profession.fashion_enthusiast"></span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
        </div>
        <div class="menu-item" onclick="window.location.href='favorites.html'">
            <span data-i18n="profile.menu.favorites"></span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        <div class="menu-item" onclick="window.location.href='settings.html'">
            <span data-i18n="profile.menu.settings"></span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </div>

    <!-- Region Modal -->
    <div class="modal-overlay" id="region-modal">
        <div class="modal-content" style="height: 80vh; max-height: 600px; display: flex; flex-direction: column;">
            <div class="modal-header">
                <div class="modal-title" data-i18n="region.modal.title"></div>
                <button class="close-btn" onclick="closeModal('region-modal')">×</button>
            </div>
            
            <div class="search-container" style="margin-bottom: 16px; background: transparent; padding: 0; border: none;">
                <input type="text" class="form-input" id="region-search" data-i18n-placeholder="region.search.placeholder" oninput="filterRegions(this.value)">
            </div>
            
            <div class="isolated-scroll" id="region-list-scroll-container" style="flex: 1; padding-right: 12px;">
                <div id="auto-location-btn" class="menu-item auto-location-item" onclick="handleAutoLocation()">
                    <div class="auto-location-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="auto-location-icon">
                            <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                        </svg>
                        <span data-i18n="region.auto_detect"></span>
                    </div>
                    <div class="auto-location-right" id="auto-location-status">
                        <!-- Status injected via JS -->
                    </div>
                </div>
                <div id="region-list">
                    <!-- Regions will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Profession Modal -->
    <div class="modal-overlay" id="profession-modal">
        <div class="modal-content" style="height: 80vh; max-height: 600px; display: flex; flex-direction: column;">
            <div class="modal-header">
                <div class="modal-title" data-i18n="profession.modal.title"></div>
                <button class="close-btn" onclick="closeModal('profession-modal')">×</button>
            </div>
            
            <div class="search-container" style="margin-bottom: 16px; background: transparent; padding: 0; border: none;">
                <input type="text" class="form-input" id="profession-search" data-i18n-placeholder="profession.search.placeholder" oninput="filterProfessions(this.value)">
            </div>
            
            <div class="isolated-scroll" id="profession-list" style="flex: 1;">
                <!-- Professions will be populated here -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-title" data-i18n="settings.title"></div>
            
            <div class="form-group">
                <div class="form-label form-label-mb" data-i18n="settings.section.language"></div>
                <div class="theme-selector">
                    <label class="theme-option">
                        <input type="radio" name="language" value="en-US">
                        <span class="theme-label" data-i18n="language.english"></span>
                    </label>
                    <label class="theme-option">
                        <input type="radio" name="language" value="zh-CN">
                        <span class="theme-label" data-i18n="language.chinese"></span>
                    </label>
                    <div class="theme-slider"></div>
                </div>
            </div>
            
            <div class="form-group form-section-divider">
                <div class="form-label form-label-mb" data-i18n="settings.section.appearance"></div>
                <div class="theme-selector">
                    <label class="theme-option">
                        <input type="radio" name="theme" value="light">
                        <span class="theme-label" data-i18n="theme.light"></span>
                    </label>
                    <label class="theme-option">
                        <input type="radio" name="theme" value="dark">
                        <span class="theme-label" data-i18n="theme.dark"></span>
                    </label>
                    <label class="theme-option">
                        <input type="radio" name="theme" value="system">
                        <span class="theme-label" data-i18n="theme.system"></span>
                    </label>
                    <div class="theme-slider"></div>
                </div>
            </div>

            <div class="form-group form-section-divider">
                <div class="form-label form-label-mb" data-i18n="settings.section.wardrobe_display"></div>
                <div class="theme-selector">
                    <label class="theme-option">
                        <input type="radio" name="wardrobeDisplay" value="list">
                        <span class="theme-label" data-i18n="wardrobe.display.list"></span>
                    </label>
                    <label class="theme-option">
                        <input type="radio" name="wardrobeDisplay" value="card">
                        <span class="theme-label" data-i18n="wardrobe.display.card"></span>
                    </label>
                    <div class="theme-slider"></div>
                </div>
            </div>
            
            <div class="form-group">
                <button class="logout-btn" onclick="logout()" data-i18n="auth.sign_out"></button>
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('settings-modal')" data-i18n="common.close"></button>
            </div>
        </div>
    </div>

    <div id="detail-view" class="detail-view">
        <div id="detail-content-body">
        </div>
    </div>

    <div id="image-modal" class="image-modal-overlay" onclick="closeImageModal()">
        <div class="image-modal-sheet">
            <div class="image-modal-sheet-head">
                <button class="close-btn" type="button" onclick="closeImageModal()">×</button>
            </div>
            <img class="modal-image" id="modal-image-content">
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span data-i18n="nav.home"></span>
        </a>
        <a href="wardrobe.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
            <span data-i18n="nav.wardrobe"></span>
        </a>
        <a href="schedule.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span data-i18n="nav.schedule"></span>
        </a>
        <a href="profile.html" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span data-i18n="nav.profile"></span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/autoLocation.js"></script>
    <script src="js/app.js"></script>
    <script>
        (function() {
            const REGION_KEYS = [
                'region.preset.new_york',
                'region.preset.london',
                'region.preset.paris',
                'region.preset.tokyo',
                'region.preset.shanghai',
                'region.preset.beijing',
                'region.preset.hong_kong',
                'region.preset.singapore',
                'region.preset.sydney',
                'region.preset.los_angeles',
                'region.preset.chicago',
                'region.preset.toronto',
                'region.preset.berlin',
                'region.preset.milan',
                'region.preset.seoul',
                'region.preset.bangkok',
                'region.preset.dubai',
                'region.preset.mumbai'
            ];

            const PROFESSION_KEYS = [
                'profession.fashion_enthusiast',
                'profession.student',
                'profession.teacher',
                'profession.programmer',
                'profession.designer',
                'profession.model',
                'profession.blogger',
                'profession.stylist',
                'profession.photographer',
                'profession.editor',
                'profession.artist',
                'profession.musician',
                'profession.actor',
                'profession.writer',
                'profession.doctor',
                'profession.lawyer',
                'profession.engineer',
                'profession.architect',
                'profession.chef',
                'profession.other'
            ];

            const normalize = (v) => String(v || '').trim().toLowerCase();

            const getCurrentUser = () => {
                try {
                    return JSON.parse(localStorage.getItem('currentUser') || '{}') || {};
                } catch (_) {
                    return {};
                }
            };

            const setCurrentUser = (user) => {
                localStorage.setItem('currentUser', JSON.stringify(user || {}));
            };

            const renderKeyList = (containerId, keys, query, onSelect) => {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = '';

                const q = normalize(query);
                const filtered = !q
                    ? keys
                    : keys.filter((key) => normalize(window.t(key)).includes(q) || normalize(key).includes(q));

                filtered.forEach((key) => {
                    const item = document.createElement('div');
                    item.className = 'menu-item';

                    const span = document.createElement('span');
                    span.setAttribute('data-i18n', key);
                    span.textContent = window.t(key);
                    item.appendChild(span);

                    item.addEventListener('click', () => onSelect(key));
                    container.appendChild(item);
                });
            };

            const applyRegion = (key) => {
                const el = document.getElementById('current-region');
                if (el) {
                    el.setAttribute('data-i18n', key);
                    el.textContent = window.t(key);
                }
                const user = getCurrentUser();
                user.regionKey = key;
                user.regionSource = 'manual';
                setCurrentUser(user);
                if (window.autoLocationService) {
                    window.autoLocationService.clearCache();
                    window.autoLocationService.updateStatusUI('success', window.t(key), key);
                }
                closeModal('region-modal');
            };

            const applyProfession = (key) => {
                const el = document.getElementById('current-profession');
                if (el) {
                    el.setAttribute('data-i18n', key);
                    el.textContent = window.t(key);
                }
                const headerRole = document.querySelector('.profile-role');
                if (headerRole) {
                    headerRole.setAttribute('data-i18n', key);
                    headerRole.textContent = window.t(key);
                }
                const user = getCurrentUser();
                user.professionKey = key;
                setCurrentUser(user);
                closeModal('profession-modal');
            };

            window.filterRegions = (value) => renderKeyList('region-list', REGION_KEYS, value, applyRegion);
            window.filterProfessions = (value) => renderKeyList('profession-list', PROFESSION_KEYS, value, applyProfession);

            window.handleAutoLocation = async () => {
                const btn = document.getElementById('auto-location-btn');
                if (btn) btn.classList.add('auto-location-loading');
                if (window.autoLocationService) {
                    window.autoLocationService.clearCache();
                    await window.autoLocationService.initAutoLocation({ force: true });
                }
                if (btn) btn.classList.remove('auto-location-loading');
            };

            window.previewAvatar = (input) => {
                if (!input || !input.files || !input.files[0]) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('edit-avatar-preview');
                    if (img) img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            };

            window.saveProfile = () => {
                const newName = (document.getElementById('edit-name')?.value || '').trim();
                const avatarPreviewSrc = document.getElementById('edit-avatar-preview')?.src || '';

                if (!newName) {
                    if (window.showToast) showToast(window.t('error.name_required'));
                    return;
                }

                const user = getCurrentUser();
                user.name = newName;
                if (avatarPreviewSrc) user.avatar = avatarPreviewSrc;
                setCurrentUser(user);

                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const idx = users.findIndex(u => u.email && user.email && u.email === user.email);
                if (idx !== -1) {
                    users[idx] = { ...users[idx], name: newName, avatar: avatarPreviewSrc || users[idx].avatar };
                    localStorage.setItem('users', JSON.stringify(users));
                }

                closeModal('edit-modal');
                updateUserProfile();
                if (window.showToast) showToast(window.t('profile.edit.saved'));
            };

            document.addEventListener('DOMContentLoaded', () => {
                window.filterRegions('');
                window.filterProfessions('');
                updateUserProfile();
            });
        })();
    </script>
</body>
</html>
