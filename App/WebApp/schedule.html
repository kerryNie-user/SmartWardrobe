<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.title.planner"></title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="planner-page">

    <header class="schedule-topbar" id="schedule-header">
        <div class="schedule-title-block">
            <div class="schedule-year" id="schedule-year"></div>
            <div class="schedule-month" id="schedule-month"></div>
        </div>
        <div class="schedule-actions">
            <button class="text-btn" id="schedule-today-btn" data-i18n="common.today"></button>
        </div>
    </header>

    <div id="schedule-view">
        <div class="calendar-strip" id="calendar-strip">
            <div class="calendar-weekdays" id="calendar-weekdays"></div>
            <div class="calendar-days" id="calendar-days"></div>
        </div>

        <div class="container" id="planner-root">
            <div id="schedule-container"></div>
        </div>
    </div>

    <div id="schedule-modal" class="modal-overlay modal-overlay-sheet">
        <div class="modal-content modal-sheet schedule-edit-sheet">
            <div class="schedule-edit-head">
                <div class="schedule-edit-mode" id="schedule-modal-title" data-i18n="schedule.modal.title.add"></div>
                <button class="close-btn" type="button" onclick="closeModal('schedule-modal')">×</button>
            </div>
            <div class="schedule-edit-body">
                <div class="schedule-edit-title">
                    <input type="text" id="schedule-title" class="schedule-title-input" data-i18n-placeholder="schedule.field.title.placeholder">
                </div>

                <div class="schedule-form">
                    <div class="schedule-row">
                        <div class="schedule-row-label" data-i18n="schedule.field.time_range.label"></div>
                        <div class="schedule-row-value schedule-time-range">
                            <input type="time" id="schedule-start-time" class="schedule-time-input">
                            <span class="schedule-time-sep">—</span>
                            <input type="time" id="schedule-end-time" class="schedule-time-input">
                        </div>
                    </div>

                    <div class="schedule-row">
                        <div class="schedule-row-label" data-i18n="schedule.field.category.label"></div>
                        <div class="schedule-row-value schedule-category-group" id="schedule-category-group">
                            <button type="button" class="schedule-category-chip" data-value="work" data-i18n="schedule.category.work"></button>
                            <button type="button" class="schedule-category-chip" data-value="meeting" data-i18n="schedule.category.meeting"></button>
                            <button type="button" class="schedule-category-chip" data-value="social" data-i18n="schedule.category.social"></button>
                            <button type="button" class="schedule-category-chip" data-value="sports" data-i18n="schedule.category.sports"></button>
                            <button type="button" class="schedule-category-chip" data-value="personal" data-i18n="schedule.category.personal"></button>
                            <button type="button" class="schedule-category-chip" data-value="travel" data-i18n="schedule.category.travel"></button>
                        </div>
                        <input type="hidden" id="schedule-category">
                    </div>

                    <div class="schedule-row">
                        <div class="schedule-row-label" data-i18n="schedule.field.location.label"></div>
                        <div class="schedule-row-value">
                            <input type="text" id="schedule-location" class="schedule-inline-input" data-i18n-placeholder="schedule.field.location.placeholder">
                        </div>
                    </div>

                    <div class="schedule-row">
                        <div class="schedule-row-label" data-i18n="schedule.field.outfit.label"></div>
                        <div class="schedule-row-value">
                            <input type="text" id="schedule-outfit" class="schedule-inline-input" data-i18n-placeholder="schedule.field.outfit.placeholder">
                        </div>
                    </div>

                    <div class="schedule-row schedule-row-multiline">
                        <div class="schedule-row-label" data-i18n="schedule.field.note.label"></div>
                        <div class="schedule-row-value">
                            <textarea id="schedule-note" class="schedule-textarea" rows="2" data-i18n-placeholder="schedule.field.note.placeholder"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-actions schedule-edit-actions">
                <button class="btn btn-cancel" type="button" onclick="closeModal('schedule-modal')" data-i18n="common.cancel"></button>
                <button class="btn btn-save" type="button" id="schedule-save-btn" data-i18n="common.save"></button>
            </div>
        </div>
    </div>

    <div id="detail-view" class="detail-view">
        <div id="detail-content-body">
        </div>
    </div>

    <div id="image-modal" class="image-modal-overlay" onclick="closeImageModal()">
        <div class="image-modal-sheet">
            <div class="image-modal-sheet-head">
                <button class="close-btn" type="button" onclick="closeImageModal()">×</button>
            </div>
            <img class="modal-image" id="modal-image-content">
        </div>
    </div>

    <button id="planner-add-btn" class="fab" type="button" data-i18n-aria-label="planner.button.add">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span data-i18n="nav.home"></span>
        </a>
        <a href="wardrobe.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
            <span data-i18n="nav.wardrobe"></span>
        </a>
        <a href="schedule.html" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span data-i18n="nav.schedule"></span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span data-i18n="nav.profile"></span>
        </a>
    </nav>

    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
