<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.title.planner"></title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="mobile-header" id="schedule-header">
        <h1 data-i18n="planner.header"></h1>
        <button id="planner-add-btn" class="edit-btn" data-i18n="planner.button.add"></button>
    </header>

    <header class="mobile-header" id="favorites-header" style="display:none;">
        <h1 data-i18n="favorites.header"></h1>
    </header>

    <div id="schedule-view">
        <div class="weekly-progress" id="weekly-progress">
            <div class="weekly-progress-head">
                <div class="weekly-progress-title" data-i18n="planner.week_progress.title"></div>
                <div class="weekly-progress-range" id="weekly-progress-range"></div>
            </div>
            <div class="weekly-progress-bar">
                <div class="weekly-progress-fill" id="weekly-progress-fill"></div>
                <div class="weekly-progress-ticks" id="weekly-progress-ticks"></div>
                <div class="weekly-progress-now" id="weekly-progress-now"></div>
            </div>
            <div class="weekly-progress-meta" id="weekly-progress-meta"></div>
            <div class="weekly-progress-days" id="weekly-progress-days"></div>
        </div>

        <div class="container" id="planner-root">
            <div id="schedule-container"></div>
        </div>
    </div>

    <div class="container" id="favorites-view" style="display:none;">
        <div id="favorites-container"></div>
    </div>

    <div id="schedule-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="schedule-modal-title" data-i18n="schedule.modal.title.add"></div>
                <button class="close-btn" onclick="closeModal('schedule-modal')">×</button>
            </div>
            <div class="form-group">
                <label data-i18n="schedule.field.title.label"></label>
                <input type="text" id="schedule-title" class="form-control" data-i18n-placeholder="schedule.field.title.placeholder">
            </div>
            <div class="form-group">
                <label data-i18n="schedule.field.start_at.label"></label>
                <input type="datetime-local" id="schedule-start-at" class="form-control">
            </div>
            <div class="form-group">
                <label data-i18n="schedule.field.remind_at.label"></label>
                <input type="datetime-local" id="schedule-remind-at" class="form-control">
                <div class="form-hint" data-i18n="schedule.field.remind_at.hint"></div>
            </div>
            <div class="form-group">
                <label data-i18n="schedule.field.note.label"></label>
                <textarea id="schedule-note" class="form-control" rows="3" data-i18n-placeholder="schedule.field.note.placeholder"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('schedule-modal')" data-i18n="common.cancel"></button>
                <button class="btn btn-save" id="schedule-save-btn" data-i18n="common.save"></button>
            </div>
        </div>
    </div>

    <div id="detail-view" class="detail-view">
        <div id="detail-content-body">
        </div>
    </div>

    <div id="image-modal" class="image-modal-overlay" onclick="closeImageModal()">
        <span class="close-image-btn">&times;</span>
        <img class="modal-image" id="modal-image-content">
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span data-i18n="nav.home"></span>
        </a>
        <a href="wardrobe.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
            <span data-i18n="nav.wardrobe"></span>
        </a>
        <a href="favorites.html" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span data-i18n="nav.schedule"></span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span data-i18n="nav.profile"></span>
        </a>
    </nav>

    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
