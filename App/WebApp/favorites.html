<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="profile.favorites.title"></title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    </head>
<body class="favorites-page">

    <header class="favorites-topbar">
        <button class="favorites-back-btn" type="button" onclick="(history.length > 1 ? history.back() : (window.location.href='profile.html'))" data-i18n-aria-label="common.back">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"></path>
                <path d="M12 19l-7-7 7-7"></path>
            </svg>
        </button>
        <div class="favorites-topbar-title" data-i18n="profile.favorites.title"></div>
    </header>

    <div class="container favorites-container" id="favorites-container"></div>

    <div id="detail-view" class="detail-view">
        <div id="detail-content-body">
        </div>
    </div>

    <div id="image-modal" class="image-modal-overlay" onclick="closeImageModal()">
        <div class="image-modal-sheet">
            <div class="image-modal-sheet-head">
                <button class="close-btn" type="button" onclick="closeImageModal()">×</button>
            </div>
            <img class="modal-image" id="modal-image-content">
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
